  <style type="text/tailwindcss">
    @import "tailwindcss"; 

    @layer base {
      :root {
        @apply text-sm;
        line-height: 1.6;
      }

      h1, h2, h3, h4 {
        @apply font-bold text-center
      }
      p { @apply mb-2 }

      button {
        @apply rounded-md bg-slate-200 border-1 border-slate-400 px-4 py-1 my-1 text-sm cursor-pointer disabled:opacity-50
      }
      details {
        @apply mb-4 py-2 border-b-slate-700 border-b-1 text-slate-800 
      }
      summary {
        @apply py-1 text-base bg-sky-700 text-white
      }

      ol {
        @apply list-decimal list-outside ml-6 mb-4
      }
      
      kbd, code, a {
        @apply text-blue-800
      }

      a {
        @apply border-b-1 
      }

      input {
        @apply border-1 px-2
      }

      hr {
        @apply my-3
      }

      blockquote{
        @apply ml-4 mb-2
      }
    }
  </style>
